<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>守护智慧稻田</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="stage-bar" aria-label="水稻生长阶段">
        <div class="title-row">
          <h1>守护智慧稻田</h1>
          <div class="mode-toggle" aria-label="游戏模式">
            <button class="selected" type="button" data-mode="auto">自动模式</button>
            <button type="button" data-mode="manual">手动选关</button>
          </div>
        </div>
        <ol id="stageList" class="stage-list" aria-label="阶段状态与选关"></ol>
      </header>

      <section class="play-area" aria-label="游戏区域">
        <aside class="guardian-panel">
          <div class="guardian" aria-label="稻田守护员">
            <img src="assets/images/characters/guardian.png" alt="稻田守护员" />
          </div>
          <p id="message" class="message">先选择一个工具，再点击稻田里的病虫害。</p>
          <div class="stats" aria-label="本关进度">
            <span>尝试 <strong id="attemptCount">0/4</strong></span>
            <span>清除 <strong id="clearedCount">0/3</strong></span>
            <span>剩余 <strong id="remainingCount">4</strong></span>
          </div>
        </aside>

        <section class="field-column">
          <section class="stage-card" aria-label="当前阶段说明">
            <h2 id="stageTitle">插秧期关卡</h2>
            <p id="stageSummary">小秧苗刚进入水田，重点观察嫩叶和幼苗受害。</p>
          </section>
          <section id="field" class="field" aria-label="实景稻田区域">
            <div class="field-photo"></div>
            <div id="pestLayer" class="pest-layer"></div>
          </section>
        </section>

        <aside class="tool-panel" aria-label="防治工具栏">
          <h2>防治工具</h2>
          <div id="toolInfo" class="tool-info" aria-live="polite">
            <strong>工具说明</strong>
            <p>点击或悬停工具，可以查看用途和适合处理的病虫害。</p>
          </div>
          <div id="toolList" class="tool-list"></div>
        </aside>
      </section>

      <dialog id="stageDialog" class="win-dialog">
        <h2 id="dialogTitle">本阶段守护成功！</h2>
        <p id="dialogText">看看这次清除了哪些病虫害。</p>
        <ul id="resultList"></ul>
        <div class="dialog-actions">
          <button id="primaryDialogButton" type="button">下一步</button>
          <button id="secondaryDialogButton" class="secondary" type="button">再玩本关</button>
        </div>
      </dialog>

      <dialog id="imageDialog" class="image-dialog">
        <button id="closeImageDialog" class="image-dialog-close" type="button" aria-label="关闭大图">×</button>
        <h2 id="imageDialogTitle">病虫害大图</h2>
        <img id="largePestImage" src="" alt="" />
        <p id="imageDialogText"></p>
      </dialog>
    </main>

    <script src="app.js"></script>
  </body>
</html>
